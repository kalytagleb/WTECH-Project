<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#22C55E" stroke-width="3">
  <style>
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    .check-path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: draw 0.5s ease forwards;
    }
  </style>
  <polyline class="check-path" points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round" />
</svg>