<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - Electronic shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="bg-white text-gray-900 min-h-screen flex flex-col">
    <nav
      class="border-b border-gray-200 px-8 flex items-center justify-between h-16 z-20"
    >
      <div class="flex items-center gap-9">
        <a
          href="../home.html"
          class="font-semibold text-sm hover:opacity-60 transition-opacity"
          >Home</a
        >
        <a
          href="#"
          class="font-semibold text-sm hover:opacity-60 transition-opacity"
          >Best Deals</a
        >
        <a
          href="#"
          class="font-semibold text-sm hover:opacity-60 transition-opacity"
          >Contacts</a
        >
        <div class="relative">
          <button
            onclick="toggleSort('catMenu')"
            class="font-semibold text-sm flex items-center hover:opacity-60 transition-opacity"
          >
            Categories
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </button>
          <div
            id="catMenu"
            class="sort-dropdown bg-white border border-gray-200 rounded-xl shadow-lg min-w-40 py-1 z-30"
          >
            <a
              href="#"
              class="block px-4 py-2 text-sm font-semibold hover:bg-gray-50"
              >Phones</a
            >
            <a
              href="#"
              class="block px-4 py-2 text-sm font-semibold hover:bg-gray-50"
              >Laptops</a
            >
            <a
              href="#"
              class="block px-4 py-2 text-sm font-semibold hover:bg-gray-50"
              >Monitors</a
            >
            <a
              href="#"
              class="block px-4 py-2 text-sm font-semibold hover:bg-gray-50"
              >Audio</a
            >
            <a
              href="#"
              class="block px-4 py-2 text-sm font-semibold hover:bg-gray-50"
              >Accessories</a
            >
          </div>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <a
          href="#"
          class="flex items-center gap-1 text-sm font-semibold hover:opacity-60 transition-opacity"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
          Search
        </a>

        <a
          href="cart.html"
          class="flex items-center gap-1 text-sm hover:opacity-60 transition-opacity"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
          Cart 0
        </a>
        <a
          href="#"
          class="text-sm font-semibold hover:opacity-60 transition-opacity"
          >Log In</a
        >
      </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
      <h1 class="text-3xl font-extrabold tracking-tight mb-8">
        Electronic shop
      </h1>
      <div
        class="w-full max-w-md border border-gray-200 rounded-2xl px-10 py-10"
      >
        <h2 class="text-3xl font-extrabold tracking-tight mb-1">
          Welcome back
        </h2>
        <p class="text-sm text-gray-500 mb-8">
          No account yet?
          <a
            href="register.html"
            class="font-bold text-gray-900 underline underline-offset-2"
            >Create one</a
          >
        </p>

        <div class="mb-4">
          <label class="block text-xs font-bold uppercase tracking-widest mb-2"
            >Email</label
          >
          <input
            type="email"
            placeholder="kalytagleb@gmail.com"
            class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono outline-none focus:border-gray-900 focus:bg-white transition-colors"
          />
        </div>

        <div class="mb-6">
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-bold uppercase tracking-widest"
              >Password</label
            >
            <a
              href="#"
              class="text-xs text-gray-400 hover:text-gray-900 transition-colors"
              >Forgot password?</a
            >
          </div>
          <input
            type="password"
            placeholder="Your password"
            class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono outline-none focus:border-gray-900 focus:bg-white transition-colors"
          />
        </div>

        <button
          class="w-full bg-black text-white font-bold text-sm py-4 rounded-xl hover:opacity-80 transition-opacity mb-6"
        >
          Log in
        </button>

        <div class="flex items-center gap-3 mb-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span
            class="text-xs font-bold text-gray-400 uppercase tracking-widest"
            >or</span
          >
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <button
          class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-xl py-3 text-sm font-semibold hover:bg-gray-50 hover:border-gray-400 transition-all"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 48 48"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M43.6 24.5c0-1.5-.1-3-.4-4.5H24v8.5h11c-.5 2.5-1.9 4.6-3.9 6v5h6.3c3.7-3.4 5.8-8.4 5.8-15z"
              fill="#4285F4"
            />
            <path
              d="M24 44c5.4 0 9.9-1.8 13.2-4.8l-6.3-5c-1.8 1.2-4.1 1.9-6.9 1.9-5.3 0-9.8-3.6-11.4-8.4H5.1v5.2C8.4 39.1 15.7 44 24 44z"
              fill="#34A853"
            />
            <path
              d="M12.6 27.7c-.4-1.2-.6-2.4-.6-3.7s.2-2.5.6-3.7v-5.2H5.1C3.8 17.6 3 20.7 3 24s.8 6.4 2.1 8.9l7.5-5.2z"
              fill="#FBBC05"
            />
            <path
              d="M24 10.9c3 0 5.7 1 7.8 3l5.8-5.8C34 4.8 29.4 3 24 3 15.7 3 8.4 7.9 5.1 15.1l7.5 5.2C14.2 14.5 18.7 10.9 24 10.9z"
              fill="#EA4335"
            />
          </svg>
          Continue with Google
        </button>
      </div>
    </main>

    <script src="../script.js"></script>
  </body>
</html>
